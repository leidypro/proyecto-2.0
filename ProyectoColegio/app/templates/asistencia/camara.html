<script src="{% static 'Js/html5-qrcode.min.js' %}"></script>

<script>
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
      const cookies = document.cookie.split(";");
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === name + "=") {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  document.addEventListener("DOMContentLoaded", function () {
    console.log("SCRIPT CARGADO");

    function onScanSuccess(decodedText) {
      scanner.clear(); 

      fetch("/colegio/registrar_asistencia/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": "{{csrf_token}}",
        },
        body: JSON.stringify({
          codigo: decodedText,
        }),
      })
        .then((response) => response.json())
        .then((data) => {
          if (data.status === "ok") {
            alert("Estudiante " + data.mensaje);
          } else {
            alert(data.mensaje);
          }
          scanner.render(onScanSuccess);
        })
        .catch((error) => {
          console.error("Error:", error);
          scanner.render(onScanSuccess);
        });
    }

    const scanner = new Html5QrcodeScanner("reader", { 
      fps: 15, 
      qrbox: { width: 220, height: 220 },
      aspectRatio: 1.0
    });

    scanner.render(onScanSuccess);
  });
</script>

<style>
  /* Contenedor Principal estilo Tarjeta Dashboard */
  .contenedor-qr {
    max-width: 440px;
    width: 90%;
    margin: 40px auto;
    padding: 30px 24px;
    background: #ffffff;
    border-radius: 16px; /* Ajustado al radio de tus tarjetas */
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); /* Sombra suave idéntica */
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    text-align: center;
    border-top: 4px solid #1a73e8; /* Detalle de línea superior con el azul principal */
  }

  /* Encabezado */
  .qr-header {
    margin-bottom: 20px;
  }

  /* Icono adaptado al rosa pastel de fondo de tu sidebar y acento azul */

    width: 55px;
    height: 55px;
    margin: 0 auto 12px;
    background: #ffe3e7; /* Fondo rosa pastel del menú */
    color: #1a73e8; /* Azul principal de acento */
    padding: 12px;
    border-radius: 12px;
  }

  .contenedor-qr h2 {
    font-size: 1.4rem;
    font-weight: 600;
    color: #2d3748;
    margin: 0 0 6px 0;
  }

  .qr-subtitle {
    font-size: 0.85rem;
    color: #718096;
    margin: 0;
  }

  /* Región del Lector */
  #reader {
    border: none !important;
    padding: 0 !important;
    overflow: hidden;
    border-radius: 12px;
    background: #f7fafc;
  }

  #reader video {
    border-radius: 12px;

  }

  /* Botones internos adaptados al estilo del Dashboard */
  #reader button {
    background-color: #1a73e8 !important; /* Azul principal */
    color: white !important;
    border: none !important;
    padding: 10px 20px !important;
    font-weight: 600 !important;
    font-size: 0.85rem !important;
    border-radius: 8px !important;
    cursor: pointer !important;
    transition: all 0.2s ease !important;
    margin: 15px 0 !important;

  }

  #reader button:hover {

  }

  /* Links y Selectores */
  #reader a {
    color: #1a73e8 !important;
    text-decoration: none !important;
    font-weight: 500;
    font-size: 0.8rem;
  }

  #reader select {
    padding: 8px 12px !important;
    border-radius: 6px !important;
    border: 1px solid #e2e8f0 !important;
    background-color: #fff !important;
    font-size: 0.85rem !important;
    color: #4a5568 !important;
    outline: none !important;
    margin-bottom: 10px;
    width: 85%;
  }
</style>
