<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Contraseña Restablecida! | Proyecto Colegio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        /* Fondo General de la App */
        body {
            background: linear-gradient(135deg, #1C2E4A, #0f172a);
            font-family: 'Segoe UI', sans-serif;
        }

        .main-content-glass {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Tarjeta */
        .card-custom {
            border-radius: 20px;
            overflow: hidden;
            border: none;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.35);
            background: #ffffff;
            animation: fadeIn 0.6s ease;
        }

        /* Header en Azul Marino Identitario */
        .card-header-custom {
            background: linear-gradient(135deg, #1C2E4A, #2b456e);
            padding: 35px 20px;
            text-align: center;
            color: white;
        }

        /* Icono circular translúcido */
        .icon-circle {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        /* Icono principal centrado en el Azul Marino del Sistema */
        .icon-highlight {
            font-size: 60px;
            color: #1C2E4A;
        }

        /* Texto descriptivo */
        .text-secondary {
            color: #6b7280 !important;
        }

        /* Caja informativa adaptada al Rosa Pastel del Sistema */
        .reference-box {
            background: #FFF0F2;
            border-left: 5px solid #FCD7D9;
            border-radius: 10px;
            font-size: 14px;
            color: #1C2E4A;
            font-weight: 500;
        }

        /* Botón de Iniciar Sesión en Azul Marino Consistente */
        .btn-save {
            background: #1C2E4A;
            color: white;
            border-radius: 12px;
            padding: 12px;
            border: none;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-save:hover {
            background: #111d30;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0px 10px 25px rgba(28, 46, 74, 0.25);
        }

        /* Animación de entrada suave */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="main-content-glass d-flex align-items-center justify-content-center" style="min-height: 100vh; width: 100vw;">

    <div class="container d-flex justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card-form card-custom">
                
                <div class="card-header-custom">
                    <div class="icon-circle">
                        <i class="fas fa-check fa-2x text-white"></i>
                    </div>
                    <h3 style="font-weight: 700; letter-spacing: -0.5px;">¡Contraseña Actualizada!</h3>
                    <p class="text-white-50 m-0" style="font-size: 15px;">
                        Tu contraseña se restableció correctamente.
                    </p>
                </div>

                <div class="card-body p-4 p-md-5 text-center">
                    
                    <div class="mb-4">
                        <i class="fas fa-user-check icon-highlight"></i>
                    </div>

                    <p class="text-secondary" style="font-size: 16px; line-height: 1.6;">
                        El proceso ha finalizado con éxito. Ya puedes iniciar sesión en el sistema 
                        utilizando tu nueva contraseña.
                    </p>

                    <div class="reference-box p-3 mb-4 text-start d-flex align-items-start gap-2">
                        <i class="fas fa-shield-alt mt-1 text-danger opacity-75"></i> 
                        <span>Mantén tu cuenta segura. No compartas tus credenciales con nadie.</span>
                    </div>

                    <hr class="my-4 opacity-25">

                    <div class="d-grid">
                        <a href="{% url 'login:login' %}" class="btn-save btn-lg text-decoration-none text-center">
                            <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
