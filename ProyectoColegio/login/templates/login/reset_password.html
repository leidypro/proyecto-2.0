<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Proyecto Colegio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="../css/estilos_proyectocolegio.css">

    <style>
        body {
            background: linear-gradient(135deg, #1C2E4A, #0f172a);
            font-family: 'Segoe UI', sans-serif;
        }

        .main-content-glass {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Tarjeta */
        .card-custom {
            border-radius: 20px;
            overflow: hidden;
            border: none;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.35);
            background: #ffffff;
            animation: fadeIn 0.6s ease;
        }

        /* Header */
        .card-header-custom {
            background: linear-gradient(135deg, #1C2E4A, #2b456e);
            padding: 35px 20px;
            text-align: center;
            color: white;
        }

        /* Inputs Django Estilizados */
        #django-form p {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        #django-form input {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        /* Enfoque interactivo */
        #django-form input:focus {
            border-color: #1C2E4A;
            box-shadow: 0px 0px 0px 3px rgba(28, 46, 74, 0.15);
            outline: none;
        }

        /* 🔵 ESTADOS DE VALIDACIÓN INTERACTIVA CON COLORES DEL SISTEMA 🔴 */
        #django-form input.is-valid-custom {
            border-color: #1C2E4A !important;
            box-shadow: 0px 0px 0px 3px rgba(28, 46, 74, 0.1) !important;
            background-color: #ffffff;
        }
        
        #django-form input.is-invalid-custom {
            border-color: #FCD7D9 !important; /* Borde rosa pastel */
            background-color: #FFF0F2 !important; /* Fondo rosa pastel */
        }

        /* Labels */
        #django-form label {
            font-weight: 600;
            color: #1C2E4A;
            margin-bottom: 6px;
        }

        /* Botón principal */
        .btn-save {
            background: #1C2E4A;
            color: white;
            border-radius: 12px;
            padding: 12px;
            border: none;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-save:hover {
            background: #111d30;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0px 10px 25px rgba(28, 46, 74, 0.25);
        }

        /* Botón volver flotante */
        .btn-back-floating {
            background: white;
            color: #1C2E4A;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn-back-floating:hover {
            background: #FFF0F2; /* Toque rosa pastel del sistema */
            color: #1C2E4A;
        }

        /* Caja de Errores adaptada a la paleta unificada */
        .error-box {
            background: #FFF0F2;
            border: 1px solid #FCD7D9;
            border-left: 5px solid #b91c1c; /* Detalle de color de alerta */
            border-radius: 12px;
            padding: 14px;
        }

        .error-item {
            color: #1C2E4A;
            font-size: 14px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="main-content-glass d-flex align-items-center justify-content-center" style="min-height: 100vh; width: 100vw;">

        <a href="{% url 'login:login' %}" class="btn-back-floating position-fixed top-0 start-0 m-4 text-decoration-none">
            <i class="fas fa-arrow-left me-2"></i> Volver al Login
        </a>

        <div class="container d-flex justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card-form card-custom">
                    <div class="card-header-custom">
                        <i class="fas fa-envelope-open-text fa-3x text-white mb-3"></i>
                        <h3 style="font-weight: 700; letter-spacing: -0.5px;">Restablecer Clave</h3>
                        <p class="text-white-50 m-0" style="font-size: 15px;">Enviaremos un enlace de recuperación a tu correo electrónico.</p>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        <form id="django-form" method="POST" novalidate>
                            {% csrf_token %}

                            {{ form.as_p }}

                            <!-- Caja de error dinámico de JS en sintonía con la paleta institucional -->
                            <div id="js-error-msg" class="error-box mb-3 d-none">
                                <div class="error-item">
                                    <i class="fas fa-exclamation-circle me-2 text-danger"></i> <span id="js-error-text"></span>
                                </div>
                            </div>

                            {% if form.errors %}
                                <div class="error-box mb-3">
                                    {% for field in form %}
                                        {% for error in field.errors %}
                                            <div class="error-item mb-1">
                                                <i class="fas fa-exclamation-circle me-2 text-danger"></i> {{ error }}
                                            </div>
                                        {% endfor %}
                                    {% endfor %}
                                </div>
                            {% endif %}

                            <div class="d-grid mt-4">
                                <button type="submit" id="btn-submit" class="btn-save btn-lg">
                                    Enviar Correo <i class="fas fa-paper-plane ms-2"></i>
                                </button>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const emailInput = document.querySelector("#django-form input[type='email']");
            const feedbackContainer = document.getElementById("js-error-msg");
            const feedbackText = document.getElementById("js-error-text");
            const btnSubmit = document.getElementById("btn-submit");

            if (emailInput) {
                emailInput.addEventListener("input", function() {
                    const emailValue = emailInput.value.trim();
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                    if (emailValue === "") {
                        emailInput.classList.remove("is-valid-custom", "is-invalid-custom");
                        feedbackContainer.classList.add("d-none");
                        btnSubmit.disabled = false;
                    } else if (!emailRegex.test(emailValue)) {
                        emailInput.classList.remove("is-valid-custom");
                        emailInput.classList.add("is-invalid-custom");
                        feedbackText.textContent = "Por favor, ingresa una dirección de correo válida.";
                        feedbackContainer.classList.remove("d-none");
                        btnSubmit.disabled = true;
                    } else {
                        emailInput.classList.remove("is-invalid-custom");
                        emailInput.classList.add("is-valid-custom");
                        feedbackContainer.classList.add("d-none");
                        btnSubmit.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
